<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Performance Predictor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#667eea,#764ba2);
}

.container{
width:550px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter: blur(15px);
box-shadow:0 8px 32px rgba(0,0,0,0.2);
color:white;
}

h1{
text-align:center;
margin-bottom:20px;
font-weight:600;
}

legend{
text-align:center;
margin-bottom:25px;
font-size:18px;
opacity:0.9;
}

label{
display:block;
margin-bottom:5px;
font-size:14px;
}

input, select{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:none;
outline:none;
font-size:14px;
background:#ffffff;
color:#222;
}

input::placeholder{
color:#888;
}


select{
background:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#ff7eb3,#ff758c);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.result{
margin-top:20px;
text-align:center;
font-size:20px;
font-weight:bold;
color:#ffeaa7;
}

</style>
</head>

<body>

<div class="container">

<h1>Student Exam Performance Indicator</h1>

<form action="{{ url_for('predict_datapoint')}}" method="post">

<legend>Predict Maths Score</legend>

<label>Gender</label>
<select name="gender" required>
<option disabled selected>Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Race / Ethnicity</label>
<select name="ethnicity" required>
<option disabled selected>Select Group</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>

<label>Parental Education</label>
<select name="parental_level_of_education" required>
<option disabled selected>Select Education</option>
<option value="associate's degree">Associate's degree</option>
<option value="bachelor's degree">Bachelor's degree</option>
<option value="high school">High School</option>
<option value="master's degree">Master's degree</option>
<option value="some college">Some college</option>
<option value="some high school">Some high school</option>
</select>

<label>Lunch Type</label>
<select name="lunch" required>
<option disabled selected>Select Lunch</option>
<option value="free/reduced">Free/Reduced</option>
<option value="standard">Standard</option>
</select>

<label>Test Preparation</label>
<select name="test_preparation_course" required>
<option disabled selected>Select Course</option>
<option value="none">None</option>
<option value="completed">Completed</option>
</select>

<label>Reading Score</label>
<input type="number" name="reading_score" min="0" max="100" placeholder="Enter Reading Score">

<label>Writing Score</label>
<input type="number" name="writing_score" min="0" max="100" placeholder="Enter Writing Score">

<button type="submit">Predict Maths Score</button>

</form>

<div class="result">
Prediction: {{results}}
</div>

</div>

</body>
</html>
